services:

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  stt:
    build:
      context: ..
      dockerfile: runtime/stt/Dockerfile
    ports:
      - "8001:8001"
    environment:
      VOICEKIT_STT_MODEL: ${VOICEKIT_STT_MODEL:-whisper}
      VOICEKIT_STT_VARIANT: ${VOICEKIT_STT_VARIANT:-small}
    volumes:
      - whisper_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    mem_limit: 2g

  tts:
    build:
      context: ..
      dockerfile: runtime/tts/Dockerfile
    ports:
      - "8002:8002"
    environment:
      VOICEKIT_TTS_MODEL: ${VOICEKIT_TTS_MODEL:-chatterbox-turbo}
      VOICEKIT_TTS_VOICE: ${VOICEKIT_TTS_VOICE:-default}
    volumes:
      - chatterbox_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    mem_limit: 4g

  gateway:
    build:
      context: ..
      dockerfile: runtime/gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      VOICEKIT_PROJECT: ${VOICEKIT_PROJECT:-voicekit}
      VOICEKIT_STT_MODEL: ${VOICEKIT_STT_MODEL:-whisper}
      VOICEKIT_STT_VARIANT: ${VOICEKIT_STT_VARIANT:-small}
      VOICEKIT_TTS_MODEL: ${VOICEKIT_TTS_MODEL:-chatterbox-turbo}
      VOICEKIT_TTS_VOICE: ${VOICEKIT_TTS_VOICE:-default}
      VOICEKIT_LLM_PROVIDER: ${VOICEKIT_LLM_PROVIDER:-anthropic}
      VOICEKIT_LLM_MODEL: ${VOICEKIT_LLM_MODEL:-claude-haiku-4-5}
      VOICEKIT_LLM_API_KEY: ${VOICEKIT_LLM_API_KEY:-}
      VOICEKIT_VAD_ENABLED: ${VOICEKIT_VAD_ENABLED:-true}
      VOICEKIT_VAD_SENSITIVITY: ${VOICEKIT_VAD_SENSITIVITY:-0.5}
      VOICEKIT_SYSTEM_PROMPT: ${VOICEKIT_SYSTEM_PROMPT:-You are a helpful voice assistant.}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      STT_WS_URL: ws://stt:8001/stt
      TTS_WS_URL: ws://tts:8002/tts
    depends_on:
      redis:
        condition: service_healthy
      stt:
        condition: service_healthy
      tts:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    mem_limit: 512m

volumes:
  whisper_cache:
  chatterbox_cache: