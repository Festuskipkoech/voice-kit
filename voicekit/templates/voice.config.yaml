project: my-agent

stt:
  model: whisper
  variant: tiny          # tiny / base / small / medium / large-v3

tts:
  model: chatterbox-turbo
  voice: default          # default or /path/to/reference.wav for voice cloning

vad:
  enabled: true
  sensitivity: 0.5        # 0.0 = loud speech only / 1.0 = catch everything

llm:
  provider: anthropic
  model: claude-haiku-4-5
  api_key: ${ANTHROPIC_API_KEY}

system_prompt: >
  You are a helpful voice assistant.
  Keep responses concise and natural.
  Never use markdown — you are speaking out loud.