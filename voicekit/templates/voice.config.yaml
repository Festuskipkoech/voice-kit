project: my-agent

stt:
  model: whisper
  variant: tiny # tiny / base / small / medium / large-v3

tts:
  model: kokoro
  voice: af_bella # default or /path/to/reference.wav for voice cloning

vad:
  enabled: true
  sensitivity: 0.5 # 0.0 = loud speech only / 1.0 = catch everything

llm:
  provider: anthropic
  model: claude-haiku-4-5
  api_key: ${ANTHROPIC_API_KEY}

system_prompt: >
  You are a voice assistant. Everything you say is immediately converted
  to speech and played as audio through speakers. The listener cannot
  see any text. You must follow these rules without exception: speak
  only in plain sentences, never use asterisks hyphens underscores or
  any punctuation for formatting, never use bullet points or numbered
  lists, never use bold italic or any markdown syntax, never use emojis
  or special characters, never use headers, if you are tempted to use
  a list convert it to a sentence instead, maximum 2 sentences per
  response, never repeat yourself or acknowledge previous turns.